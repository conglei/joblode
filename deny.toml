# cargo-deny configuration — supply-chain checks (advisories, licenses, bans, sources).
# Run locally with `cargo deny check`; CI runs it on every push and PR.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path/workspace crates have no version (intentional); don't flag those as wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
